<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#a67c52"/>
  <g stroke="#fff" stroke-width="2.2" stroke-linecap="round" fill="none">
    <!-- Dumbbell bar -->
    <line x1="8" y1="16" x2="24" y2="16"/>
    <!-- Left weight plates -->
    <rect x="5" y="11" width="4" height="10" rx="1.2" fill="#fff" stroke="none"/>
    <!-- Right weight plates -->
    <rect x="23" y="11" width="4" height="10" rx="1.2" fill="#fff" stroke="none"/>
    <!-- Left end cap -->
    <line x1="5" y1="13" x2="5" y2="19"/>
    <!-- Right end cap -->
    <line x1="27" y1="13" x2="27" y2="19"/>
  </g>
</svg>
